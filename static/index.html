<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Sales by region</title>
        <style>
            :root {
                color-scheme: light dark;
                --bg: #f6f7f9;
                --card: #fff;
                --text: #1a1d24;
                --muted: #5c6470;
                --border: #e2e5eb;
                --accent: #2563eb;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #111318;
                    --card: #1a1d24;
                    --text: #eef0f4;
                    --muted: #9aa3b2;
                    --border: #2d3340;
                    --accent: #60a5fa;
                }
                .error {
                    color: #f87171;
                }
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                font-family:
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.5;
            }
            main {
                max-width: 52rem;
                margin: 0 auto;
                padding: 2rem 1.25rem 3rem;
            }
            h1 {
                font-size: 1.35rem;
                font-weight: 600;
                margin: 0 0 0.25rem;
            }
            .subtitle {
                color: var(--muted);
                font-size: 0.9rem;
                margin-bottom: 1.5rem;
            }
            .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 1rem 1.25rem;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
                margin-top: 1rem;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.95rem;
            }
            th,
            td {
                text-align: left;
                padding: 0.55rem 0.65rem;
                border-bottom: 1px solid var(--border);
            }
            th {
                font-weight: 600;
                color: var(--muted);
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.03em;
            }
            tbody tr:last-child td {
                border-bottom: none;
            }
            tbody tr:hover td {
                background: color-mix(in srgb, var(--accent) 6%, transparent);
            }
            .num {
                text-align: right;
                font-variant-numeric: tabular-nums;
            }
            .error {
                color: #b91c1c;
                margin-top: 1rem;
            }
            .loading {
                color: var(--muted);
            }
        </style>
    </head>
    <body>
        <main>
            <h1 id="title">Sales aggregation</h1>
            <div class="card">
                <p class="loading" id="loading">Loading...</p>
                <div id="table-wrap" hidden></div>
                <p class="error" id="error" hidden></p>
            </div>
        </main>
        <script>
            const moneyFmt = new Intl.NumberFormat(undefined, {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 2,
            });

            function formatMoney(n) {
                return moneyFmt.format(n);
            }

            function looksLikeCurrencyColumn(name) {
                return /revenue|amount|price|cost|fee|total|sale|payment|balance|usd|eur|gbp/i.test(String(name));
            }

            function formatCell(columnName, value) {
                if (value === null || value === undefined) return '—';
                if (typeof value === 'number') {
                    if (looksLikeCurrencyColumn(columnName)) return formatMoney(value);
                    const maxFrac = Number.isInteger(value) ? 0 : 2;
                    return new Intl.NumberFormat(undefined, { maximumFractionDigits: maxFrac }).format(value);
                }
                if (typeof value === 'boolean') return value ? 'true' : 'false';
                return escapeHtml(String(value));
            }

            function renderTable(columns, rows) {
                const thead = '<thead><tr>' + columns.map((c) => `<th>${escapeHtml(c)}</th>`).join('') + '</tr></thead>';
                const body = rows
                    .map((row) => {
                        const cells = columns.map((c) => {
                            const v = row[c];
                            const cls = typeof v === 'number' ? 'num' : '';
                            return `<td class="${cls}">${formatCell(c, v)}</td>`;
                        });
                        return '<tr>' + cells.join('') + '</tr>';
                    })
                    .join('');
                return `<table>${thead}<tbody>${body}</tbody></table>`;
            }

            function escapeHtml(s) {
                return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            async function run() {
                const loading = document.getElementById('loading');
                const errEl = document.getElementById('error');
                const wrap = document.getElementById('table-wrap');
                const titleEl = document.getElementById('title');

                try {
                    const res = await fetch('/api/summary');
                    if (!res.ok) throw new Error(res.statusText || String(res.status));
                    const data = await res.json();

                    titleEl.textContent = data.title || 'Sales aggregation';
                    wrap.hidden = false;
                    wrap.innerHTML = renderTable(data.columns, data.rows);
                } catch (e) {
                    errEl.hidden = false;
                    errEl.textContent =
                        'Could not load data: ' + (e instanceof Error ? e.message : String(e));
                } finally {
                    loading.hidden = true;
                }
            }

            run();
        </script>
    </body>
</html>
