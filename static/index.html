<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sales by region</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --card: #fff;
        --text: #1a1d24;
        --muted: #5c6470;
        --border: #e2e5eb;
        --accent: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111318;
          --card: #1a1d24;
          --text: #eef0f4;
          --muted: #9aa3b2;
          --border: #2d3340;
          --accent: #60a5fa;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      main {
        max-width: 52rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      .subtitle {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem 1.25rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.55rem 0.65rem;
        border-bottom: 1px solid var(--border);
      }
      th {
        font-weight: 600;
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover td {
        background: color-mix(in srgb, var(--accent) 6%, transparent);
      }
      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .totals {
        margin-top: 1.25rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
        font-size: 0.95rem;
        color: var(--muted);
      }
      .totals strong {
        color: var(--text);
        font-weight: 600;
      }
      .error {
        color: #b91c1c;
        margin-top: 1rem;
      }
      @media (prefers-color-scheme: dark) {
        .error {
          color: #f87171;
        }
      }
      .loading {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Sales aggregation</h1>
      <p class="subtitle" id="subtitle">Loading…</p>
      <div class="card">
        <p class="loading" id="loading">Fetching data…</p>
        <div id="table-wrap" hidden></div>
        <p class="error" id="error" hidden></p>
      </div>
    </main>
    <script>
      function formatMoney(n) {
        return new Intl.NumberFormat(undefined, {
          style: "currency",
          currency: "USD",
          maximumFractionDigits: 2,
        }).format(n);
      }

      function formatNumber(n) {
        return new Intl.NumberFormat(undefined, { maximumFractionDigits: 2 }).format(n);
      }

      function looksLikeCurrencyColumn(name) {
        return /revenue|amount|price|cost|fee|total|sale|payment|balance|usd|eur|gbp/i.test(String(name));
      }

      function formatCell(columnName, value) {
        if (value === null || value === undefined) return "—";
        if (typeof value === "number") {
          if (looksLikeCurrencyColumn(columnName)) return formatMoney(value);
          if (!Number.isInteger(value)) return formatNumber(value);
          return new Intl.NumberFormat(undefined, { maximumFractionDigits: 0 }).format(value);
        }
        if (typeof value === "boolean") return value ? "true" : "false";
        return escapeHtml(String(value));
      }

      function renderTable(columns, rows) {
        const thead = "<thead><tr>" + columns.map((c) => `<th>${escapeHtml(c)}</th>`).join("") + "</tr></thead>";
        const body = rows
          .map((row) => {
            const cells = columns.map((c) => {
              const v = row[c];
              const isNum = typeof v === "number";
              const cls = isNum ? "num" : "";
              const text = formatCell(c, v);
              return `<td class="${cls}">${text}</td>`;
            });
            return "<tr>" + cells.join("") + "</tr>";
          })
          .join("");
        return `<table>${thead}<tbody>${body}</tbody></table>`;
      }

      function renderTotals(totals) {
        const entries = Object.entries(totals || {});
        if (!entries.length) {
          return '<div class="totals">No numeric columns to sum across rows (or empty result).</div>';
        }
        const bits = entries.map(
          ([k, v]) =>
            `<span><strong>${escapeHtml(k)}</strong> ${formatCell(k, typeof v === "number" ? v : Number(v))}</span>`
        );
        return `<div class="totals"><strong>Totals (rolled up)</strong> · ${bits.join(" · ")}</div>`;
      }

      function escapeHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      async function run() {
        const loading = document.getElementById("loading");
        const errEl = document.getElementById("error");
        const wrap = document.getElementById("table-wrap");
        const subtitle = document.getElementById("subtitle");
        const titleEl = document.getElementById("title");

        try {
          const res = await fetch("/api/summary");
          if (!res.ok) throw new Error(res.statusText || String(res.status));
          const data = await res.json();

          titleEl.textContent = data.title || "Sales aggregation";
          subtitle.textContent = "DuckDB demo · live from /api/summary";

          loading.hidden = true;
          wrap.hidden = false;
          wrap.innerHTML = renderTable(data.columns, data.rows);
          wrap.insertAdjacentHTML("beforeend", renderTotals(data.totals));
        } catch (e) {
          loading.hidden = true;
          errEl.hidden = false;
          errEl.textContent = "Could not load data: " + (e && e.message ? e.message : String(e));
        }
      }

      run();
    </script>
  </body>
</html>
